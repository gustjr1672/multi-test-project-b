version: '3.8'

# Nginx는 API 컨테이너들과 같은 네트워크를 씁니다.
services:
  # 🎯 Blue 컨테이너 (포트 9080)
  api-blue-b:
    image: zero-api-b:${IMAGE_TAG:-latest}
    build: .
    container_name: api-blue-b
    restart: unless-stopped
    environment:
      - ConnectionStrings__DefaultConnection=${DB_URL}
    ports:
      - "127.0.0.1:9080:8080"
    stop_grace_period: 60s

  # 🎯 Green 컨테이너 (포트 9081)
  api-green-b:
    image: zero-api-b:${IMAGE_TAG:-latest}
    build: .
    container_name: api-green-b
    restart: unless-stopped
    environment:
      - ConnectionStrings__DefaultConnection=${DB_URL}
    ports:
      - "127.0.0.1:9081:8080"
    stop_grace_period: 60s