name: Deploy Project B (Self-Hosted)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 수동 배포 버튼 활성화

jobs:
  deploy:
    # ⭐️ 핵심: B 프로젝트 전용 배달부를 호출합니다!
    runs-on: [self-hosted, project-b, dev]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Script
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          chmod +x deploy.sh
          bash deploy.sh